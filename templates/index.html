    .empty-state {

      align-items: center;

      text-align: center;

    }

    .empty-state::before {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      z-index: -1;

    @keyframes breathe {

        opacity: 0.3;

      50% {

        opacity: 0.6;
      }

  <body>

    <div class="chat-header">
        <div class="logo">
          <img src="/static/bolt-logo.png" alt="Bolt Logo">
        </div>

      </div>
    <div class="flex-container">
      <div class="flex-child">
          <div class="container">
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                  <i class="fas fa-robot"></i>
                  <h3>Ready to help!</h3>
                  <p>Upload your documents and start asking questions about their
                    content.</p>
                </div>
              </div>
            </div>
      </div>
      <div class="flex-child child2">
       <div class="chat-input-container">
              <form id="questionForm" class="input-wrapper">
                <textarea id="questionInput" class="chat-input"
                  placeholder="Ask me anything about your documents..."
                  rows="1"></textarea>
                <button type="submit" class="send-btn" id="sendBtn">
                  <i class="fas fa-paper-plane"></i>
                </button>
              </form>
              <div id="errorMsg"></div>
            </div>
      </div>
    </div>


     <script>
      function setViewportHeight() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      window.addEventListener('resize', setViewportHeight);
      window.addEventListener('load', setViewportHeight);
      </script>
    

    <script>
    const chatHistory = [];

    // Chat functionality
    function renderChat() {
      const container = document.getElementById('chatMessages');

      if (chatHistory.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <img src="/static/bolt_fav.png" class="bolt-img" alt="Bolt Logo">
            <h3>Ready to help!</h3>
            <p>Start asking questions here.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = '';

      chatHistory.forEach(chat => {
        // User message
        const userMessage = document.createElement('div');
        userMessage.className = 'message user';
        userMessage.innerHTML = `
          <div class="message-avatar">
            <i class="fas fa-user"></i>
          </div>
          <div class="message-content">
            <div class="message-text">${chat.question}</div>
          </div>
        `;
        container.appendChild(userMessage);

        // Assistant message with formatted text
        const assistantMessage = document.createElement('div');
        assistantMessage.className = 'message assistant';
        const formattedAnswer = chat.answer;
        assistantMessage.innerHTML = `
          <div class="message-avatar">
           <img src="/static/bolt_fav.png" alt="Bolt Logo">
          </div>
          <div class="message-content">
            <div class="message-text">${formattedAnswer}</div>
            <div class="message-source">
              <i class="fas fa-file-alt"></i>
              ${formatSourceWithDownload(chat.sourceDocument)}
            </div>
          </div>
        `;
        container.appendChild(assistantMessage);
      });

      container.scrollTop = container.scrollHeight;
    }
    function formatSourceWithDownload(sourceDocument) {
    if (!sourceDocument || sourceDocument === "Unknown Document") {
        return sourceDocument;
    }
    
    // Extract sources from "Sources: source1, source2, source3"
    const sourcesText = sourceDocument.replace('Sources: ', '');
    const sources = sourcesText.split(', ');
    
    const downloadLinks = sources.map(source => {
        const cleanSource = source.trim();
        return `<a href="/download/${cleanSource}" target="_blank" class="source-link" title="Download ${cleanSource}">
                  <i class="fas fa-download"></i> ${cleanSource}
                </a>`;
    }).join(', ');
    
    return `Sources: ${downloadLinks}`;
}

    // Question form
    const questionForm = document.getElementById('questionForm');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const errorMsg = document.getElementById('errorMsg');

    // Auto-resize textarea
    questionInput.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    questionInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    questionForm.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
  }
});
    questionForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = questionInput.value.trim();

      if (!question) return;

      sendBtn.disabled = true;
      sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      errorMsg.innerHTML = '';

      try {
        const response = await fetch('/ask-question/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        const data = await response.json();

        if (response.ok) {
          chatHistory.push({
            question,
            answer: data.final_answer || 'No answer found.',
            sourceDocument: data.source_document || 'Unknown Document'
          });

          renderChat();
          questionInput.value = '';
          questionInput.style.height = 'auto';
        } else {
          errorMsg.innerHTML = `<div class="status-message status-error">${data.detail || 'Something went wrong.'}</div>`;
        }

      } catch (error) {
        errorMsg.innerHTML = `<div class="status-message status-error">Network error: ${error.message}</div>`;
      } finally {
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
      }
    });

    // Initialize
    renderChat();
  </script>
